name: Build BetterWx Linux  
  
on:  
  push:  
    branches: [master]  
  pull_request:  
    branches: [master]  
  
env:  
  CARGO_TERM_COLOR: always  
  
jobs:  
  build-debian:  
    name: Build on Debian (Ubuntu)  
    runs-on: ubuntu-latest  
    steps:  
      - name: Checkout  
        uses: actions/checkout@v4  
  
      - name: Install system dependencies  
        run: |  
          sudo apt-get update  
          sudo apt-get install -y \  
            pkg-config \  
            libglib2.0-dev \  
            libgtk-3-dev \  
            libwebkit2gtk-4.0-dev \  
            libappindicator3-dev \  
            librsvg2-dev \  
            libssl-dev  
  
      - name: Setup Node.js  
        uses: actions/setup-node@v4  
        with:  
          node-version: 20  
  
      - name: Setup Rust  
        uses: dtolnay/rust-toolchain@stable  
  
      - name: Cache Rust dependencies  
        uses: actions/cache@v4  
        with:  
          path: |  
            ~/.cargo/registry  
            ~/.cargo/git  
            src-tauri/target  
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}  
          restore-keys: |  
            ${{ runner.os }}-cargo-  
  
      - name: Install npm dependencies  
        run: |  
          rm -rf node_modules package-lock.json  
          npm install  
          npm ls @rollup/rollup-linux-x64-gnu 2>/dev/null || npm install @rollup/rollup-linux-x64-gnu  
  
      - name: Build frontend  
        run: npm run build  
  
      - name: Check Rust formatting  
        working-directory: src-tauri  
        run: cargo fmt -- --check  
  
      - name: Rust lint (clippy)  
        working-directory: src-tauri  
        run: cargo clippy -- -D warnings  
  
      - name: Build Tauri app  
        working-directory: src-tauri  
        run: cargo build --release  
  
      - name: Upload Debian build artifact  
        uses: actions/upload-artifact@v4  
        with:  
          name: betterwx-debian-binary  
          path: src-tauri/target/release/betterwx-ui  
          if-no-files-found: warn
