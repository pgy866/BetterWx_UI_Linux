name: Build BetterWx Linux

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-debian:
    name: Build on Debian (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm ls @rollup/rollup-linux-x64-gnu 2>/dev/null || npm install @rollup/rollup-linux-x64-gnu

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: Rust lint (clippy)
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Build Tauri app
        working-directory: src-tauri
        run: cargo build --release

      - name: Upload Debian build artifact
        uses: actions/upload-artifact@v4
        with:
          name: betterwx-debian-binary
          path: src-tauri/target/release/betterwx-ui
          if-no-files-found: warn

  build-deepin:
    name: Build on Deepin V23 (Debian Bookworm)
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      env:
        CARGO_HOME: /opt/cargo
        RUSTUP_HOME: /opt/rustup
    steps:
      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y \
            git \
            curl \
            wget \
            ca-certificates \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            build-essential \
            nodejs \
            npm

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "/opt/cargo/bin" >> $GITHUB_PATH

      - name: Install npm dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm ls @rollup/rollup-linux-x64-gnu 2>/dev/null || npm install @rollup/rollup-linux-x64-gnu

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        working-directory: src-tauri
        run: cargo build --release

      - name: Upload Deepin V23 build artifact
        uses: actions/upload-artifact@v4
        with:
          name: betterwx-deepin-v23-binary
          path: src-tauri/target/release/betterwx-ui
          if-no-files-found: warn
